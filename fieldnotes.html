<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fungi Field Notes</title>

<link rel="icon" type="image/png" href="favicon.png" />
<link rel="shortcut icon" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />

<style>
  :root{
    --bgOverlay: rgba(0,0,0,0.62);
    --panel: rgba(20,20,20,0.88);
    --panel2: rgba(30,30,30,0.88);
    --text: #F2F2F2;
    --muted: #B9B9B9;
    --accent: #B9C8A0;
    --accent2:#9EAF86;
    --border: rgba(255,255,255,0.14);
    --danger:#A76969;
    --desktop-header-width: 1180px;
  }

  * { box-sizing: border-box; }

  html{
    margin:0;
    padding:0;
  }

  body{
    margin:0;
    min-height:100vh;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background: url("0027015A-CFA3-4237-AD58-B7418E9B049E.jpeg") no-repeat center center fixed;
    background-size: cover;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background: var(--bgOverlay);
    z-index:-1;
  }

  .top-stack{
    position: sticky;
    top: 0;
    z-index: 300;
    margin: 0;
    padding: 0;
  }

  .app-header{
    width: 100%;
    background: #000;
    line-height: 0;
    margin: 0;
    padding: 0;
  }

  .app-header img{
    display: block;
    width: 100%;
    height: auto;
    margin: 0 auto;
  }

  @media only screen and (min-width: 769px){
    .app-header img{
      width: min(100%, var(--desktop-header-width));
    }
  }

  .sectionBar{
    width: 100%;
    background: rgba(0,0,0,0.96);
    box-shadow: 0 2px 8px rgba(0,0,0,0.35);
    margin: 0;
    padding: 0;
  }

  .sectionBarInner{
    width:min(980px, 94vw);
    margin: 0 auto;
    padding: 10px 0 12px 0;
    display:flex;
    justify-content: space-between;
    align-items:flex-start;
    gap: 12px;
  }

  .titleBlock{ flex: 1; min-width: 0; }
  .sectionTitle{
    margin:0;
    color: var(--accent);
    text-transform: uppercase;
    font-size: 16px;
    line-height: 1.2;
    letter-spacing: 1px;
  }
  .sectionSubtitle{
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.25;
  }

  .wrap{
    width:min(980px, 94vw);
    margin: 0 auto 18px auto;
    background: var(--panel);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 16px 16px 22px 16px;
    backdrop-filter: blur(6px);
  }

  .btn{
    border: none;
    border-radius: 12px;
    padding: 11px 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btnRow{
    display:flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn.secondary{ background: #2F2F2F; color: var(--text); border:1px solid var(--border); }
  .btn.secondary:hover{ background:#3A3A3A; }
  .btn.primary{ background: var(--accent); color: #101010; }
  .btn.primary:hover{ background: var(--accent2); }
  .btn.danger{ background: var(--danger); color:#fff; }
  .btn.danger:hover{ filter: brightness(1.05); }

  .smallBtn{
    white-space: nowrap;
    width: auto;
    padding: 10px 12px;
  }

  .card{
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-top: 4px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
  }

  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); }
  }

  .opt{
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: 0.12s ease;
    min-height: 74px;
    display:flex;
    flex-direction: column;
    justify-content: center;
  }
  .opt:hover{ border-color: var(--accent); }
  .opt.selected{
    border-color: var(--accent);
    background: rgba(185,200,160,0.14);
  }
  .optName{
    font-weight: 800;
    font-size: 13px;
    line-height: 1.2;
  }
  .optHelp{
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.2;
  }

  .fieldRow{
    display:grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 10px;
  }

  .fieldRow > div,
  .twoCol > div{
    min-width: 0;
  }

  .twoCol{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:10px;
  }
  @media (max-width: 640px){
    .twoCol{ grid-template-columns: 1fr; }
  }

  label{
    font-size: 12px;
    color: var(--muted);
  }
  input, textarea, select{
    width: 100%;
    max-width: 100%;
    min-width: 0;
    display:block;
    padding: 11px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.35);
    color: var(--text);
    outline: none;
    font-size: 14px;
  }

  input[type="date"]{
    width:100%;
    max-width:100%;
    min-width:0;
    display:block;
    appearance: none;
    -webkit-appearance: none;
  }

  textarea{
    min-height: 82px;
    resize: vertical;
  }

  .notesLabel{
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  #output{
    display:none;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.35;
  }

  .outputActions{
    display:none;
    margin-top: 10px;
  }

  .helperPreview{
    margin-top: 10px;
    color: var(--accent);
    font-weight: 800;
    font-size: 13px;
    line-height: 1.25;
  }

  .start{
    position: fixed; inset: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 18px;
    background: rgba(0,0,0,0.70);
    z-index: 30;
  }
  .startCard{
    width: min(520px, 92vw);
    background: rgba(20,20,20,0.92);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    text-align:center;
  }
  .startCard img{
    width: min(220px, 64vw);
    height: auto;
    display:block;
    margin: 6px auto 10px auto;
  }
  .startHint{
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  .paletteWrap{
    margin-top: 10px;
  }
  .palette{
    display:grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
  }
  @media (max-width: 520px){
    .palette{ grid-template-columns: repeat(6, 1fr); }
  }
  .swatch{
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.25);
    cursor:pointer;
  }
  .swatch.selected{
    outline: 3px solid var(--accent);
    border-color: rgba(255,255,255,0.35);
  }
  .selectedColourText{
    margin-top: 10px;
    color: var(--accent);
    font-weight: 800;
    font-size: 13px;
  }

  .gpsRow{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  .gpsStatus{
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.25;
  }

  .modal{
    position: fixed; inset: 0;
    display:none;
    align-items:center;
    justify-content:center;
    padding: 18px;
    background: rgba(0,0,0,0.70);
    z-index: 20;
  }
  .modalCard{
    width: min(880px, 94vw);
    max-height: min(82vh, 820px);
    overflow: auto;
    background: rgba(20,20,20,0.92);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px;
  }
  .modalHead{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .modalTitle{
    margin:0;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 14px;
  }
  .logItem{
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    margin-top: 10px;
  }
  .logMeta{
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
    line-height: 1.25;
  }
  .logText{
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.35;
  }
  .logBtns{
    display:flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .btn.tiny{
    width: auto;
    padding: 9px 11px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 800;
  }

  .confirmOverlay{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 40;
    padding: 18px;
  }
  .confirmCard{
    width:min(460px, 92vw);
    background: rgba(24,24,24,0.96);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
  }
  .confirmTitle{
    margin:0 0 8px 0;
    color: var(--accent);
    text-transform: uppercase;
    font-size: 15px;
    letter-spacing: 0.8px;
  }
  .confirmText{
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
  }

  .inatBtn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
  }
  .inatDot{
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.18;
    position: relative;
    display:inline-block;
  }
  .inatDot::after{
    content:"i";
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    font-size:12px;
    color: currentColor;
    opacity: 1;
  }

  .stickyNavWrap{
    position: sticky;
    bottom: 0;
    z-index: 280;
    margin-top: 14px;
    padding-top: 14px;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    background: linear-gradient(to top, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.90) 64%, rgba(0,0,0,0) 100%);
  }

  .appFooter{
    display:flex;
    justify-content: space-between;
    align-items:center;
    gap: 14px;
    margin-top: 18px;
    padding-top: 10px;
    font-size: 12px;
    color: var(--accent);
    flex-wrap: wrap;
  }

  .appFooter a{
    color: var(--accent);
    text-decoration: underline;
  }

  .appFooter a:hover{
    opacity: 0.9;
  }
</style>
</head>

<body>

<div class="start" id="start">
  <div class="startCard">
    <img src="IMG_1678.png" alt="Logo" />
    <div class="startHint">Document a fungus observation step-by-step.</div>
    <button class="btn primary" onclick="begin()">Begin</button>
  </div>
</div>

<div class="confirmOverlay" id="confirmOverlay">
  <div class="confirmCard">
    <h3 class="confirmTitle" id="confirmTitle">Confirm</h3>
    <div class="confirmText" id="confirmText">Are you sure?</div>
    <div class="btnRow">
      <button class="btn secondary" onclick="closeConfirm(false)">Cancel</button>
      <button class="btn danger" onclick="closeConfirm(true)">Start Again</button>
    </div>
  </div>
</div>

<div class="modal" id="forayModal">
  <div class="modalCard">
    <div class="modalHead">
      <h3 class="modalTitle">Foray Log</h3>
      <button class="btn secondary smallBtn" onclick="closeForayLog()">Close</button>
    </div>

    <div class="btnRow" style="margin-top:0;">
      <button class="btn secondary" onclick="exportForayLog()">Export All (Copy)</button>
      <button class="btn secondary" onclick="clearForayLog()">Clear Log</button>
    </div>

    <div id="forayList"></div>
  </div>
</div>

<div class="top-stack">
  <header class="app-header">
    <img src="SIX_F4B5FB21-A3A5-4712-B100-3BEF873C9D7E.png" alt="Hinterland Fungi banner">
  </header>

  <div class="sectionBar">
    <div class="sectionBarInner">
      <div class="titleBlock">
        <h2 class="sectionTitle" id="sectionTitle">Loading…</h2>
        <div class="sectionSubtitle" id="sectionSubtitle"></div>
      </div>
      <button class="btn secondary smallBtn" id="skipBtn" onclick="skipSection()">Skip</button>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="card" id="content"></div>

  <div class="notesLabel">Additional notes</div>
  <textarea id="notes" placeholder="Additional notes"></textarea>

  <div id="output"></div>

  <div class="outputActions" id="outputActions">
    <button class="btn primary inatBtn" onclick="copyAndOpenINat()">
<img src="IMG_0235.png" alt="iNaturalist" class="inatIcon">
      <span>Copy to Clipboard and Open iNaturalist</span>
    </button>
  </div>

  <div class="btnRow" id="finalBtns" style="display:none;">
    <button class="btn primary" onclick="generateListDescription()">Generate List Description</button>
    <button class="btn primary" onclick="generateWrittenDescription()">Generate Written Description</button>
    <button class="btn primary" onclick="saveToForayLog()">Save to Foray Log</button>
    <button class="btn primary" onclick="openForayLog()">View Foray Log</button>
    <button class="btn secondary" onclick="startAgain()">Start Again</button>
  </div>

  <div class="stickyNavWrap" id="navSticky">
    <div class="btnRow" style="margin-top:0;">
      <button class="btn secondary" id="prevBtn" onclick="prevSection()">Previous</button>
      <button class="btn primary" id="nextBtn" onclick="nextSection()">Next</button>
    </div>
  </div>

  <div class="appFooter">
    <div>© 2026 Hinterland Fungi. All rights reserved.</div>
    <div><a href="https://www.hinterlandfungi.com" target="_blank" rel="noopener noreferrer">Back to main page</a></div>
  </div>
</div>

<script>
/* =========================
   DATA + STATE
========================= */

const state = {
  stepIndex: 0,
  selections: {},
  textInputs: {},
  notes: {},
  skipped: new Set(),
  gpsStatus: "",

const isEmpty = (v) => v == null || (typeof v === "string" && v.trim() === "");

const FORAY_STORAGE_KEY = "mushroom_foray_log_v1";

let confirmCallback = null;

const COLOURS = [
  {name:"Crimson", hex:"#7A1123"},

/* =========================
   UNIVERSAL SECTIONS
========================= */

const GENERAL = [{
  key:"general",
  title:"General Information",
  subtitle:"Basic observation details.",
  type:"general",
}];

const FUNGUS_TYPE = [{
  key:"fungus_type",

/* =========================

========================= */

const MUSHROOM_PRE = [

    options:[

  {

  { key:"morel_colour", title:"Colour", subtitle:"Select colour(s).", type:"palette", multi:true },
  { key:"stipe_colour", title:"Stipe Colour", subtitle:"Select colour(s).", type:"palette", multi:true },
  { key:"stipe_length", title:"Stipe Length", subtitle:"Enter stipe length in mm.", type:"measure_mm" },
  {
    key:"specimen_collection",
    title:"Specimen Collection",
    subtitle:"Was a specimen collected?",
    type:"options",
    options:[ {v:"Yes",h:"Collected for further study."},{v:"No",h:"Not collected."} ]
  }
];

/* =========================
   FLOW COMPUTATION
========================= */

function getArray(key){
  if(!state.selections[key]) state.selections[key] = [];
  if(!Array.isArray(state.selections[key])) state.selections[key] = [];
  return state.selections[key];
}
function getSingle(key){
  const arr = getArray(key);
  return arr.length ? arr[arr.length-1] : "";
}

function getFlow(){
  const flow = [];
  flow.push(...GENERAL);
  flow.push(...FUNGUS_TYPE);
  flow.push(...UNIVERSAL_ENV);

  const type = getSingle("fungus_type");

  if(type === "Mushrooms"){
    flow.push(...MUSHROOM_PRE);

    const hym = getSingle("hymenium_type");
    if(hym === "Lamellae") flow.push(...LAM);
    if(hym === "Pores/Tubes") flow.push(...POR);
    if(hym === "Teeth/Spines") flow.push(...TEETH);
    if(hym === "Ridges/Folds") flow.push(...RIDGES);

    flow.push(...MUSHROOM_COMMON);
  }
  else if(type === "Bracket / Polypore"){
    flow.push(...BRACKET);
  }
  else if(type === "Coral / Club / Icicle"){
    flow.push(...CORAL);
  }
  else if(type === "Puffball / Earthball"){
    flow.push(...PUFFBALL);
  }
  else if(type === "Stinkhorn / Cage fungus"){
    flow.push(...STINKHORN);
  }
  else if(type === "Cups / Discs / Jellies"){
    flow.push(...CUPS_JELLIES);
  }
  else if(type === "Morels & allies"){
    flow.push(...MORELS);
  }

  return flow;
}

function currentSection(){
  const flow = getFlow();
  return flow[state.stepIndex] || null;
}
function isLastStep(){
  const flow = getFlow();
  return state.stepIndex >= flow.length - 1;
}

/* =========================
   RENDERING
========================= */

function begin(){
  document.getElementById("start").style.display = "none";

  if(!state.textInputs.general){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    state.textInputs.general = {
      observer_name:"",
      date:`${yyyy}-${mm}-${dd}`,
      specimen_number:"",
      location:"",
      gps_coordinates:""
    };
  }
  render();
}

function render(){
  const sec = currentSection();
  if(!sec) return;

  if(sec.key === "volva"){
    const pv = getSingle("partial_veil");
    if(pv === "Cortina" || pv === "Remnants only"){
      state.skipped.add("volva");
      state.selections["volva"] = [];
      if(!isLastStep()){
        state.stepIndex++;
        render();
        return;
      }
    }
  }

  document.getElementById("sectionTitle").innerText = sec.title;
  document.getElementById("sectionSubtitle").innerText = sec.subtitle || "";

  document.getElementById("skipBtn").style.display = "inline-block";
  document.getElementById("prevBtn").style.visibility = state.stepIndex === 0 ? "hidden" : "visible";
  document.getElementById("nextBtn").style.display = isLastStep() ? "none" : "inline-block";
  document.getElementById("finalBtns").style.display = isLastStep() ? "flex" : "none";
  document.getElementById("navSticky").style.display = isLastStep() ? "none" : "block";

  document.getElementById("notes").value = state.notes[sec.key] || "";

  const content = document.getElementById("content");
  content.innerHTML = "";

  if(sec.type === "general"){
    content.appendChild(renderGeneral());
    return;
  }
  if(sec.type === "text"){
    const wrapper = document.createElement("div");
    wrapper.className = "fieldRow";
    const label = document.createElement("label");
    label.textContent = "Text entry";
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = sec.placeholder || "";
    input.value = state.textInputs[sec.key] || "";
    input.oninput = () => { state.textInputs[sec.key] = input.value; };
    wrapper.appendChild(label);
    wrapper.appendChild(input);
    content.appendChild(wrapper);
    return;
  }
  if(sec.type === "measure_mm"){
    content.appendChild(renderMeasureMM(sec.key));
    return;
  }
  if(sec.type === "notes_only"){
    const p = document.createElement("div");
    p.style.color = "var(--muted)";
    p.style.fontSize = "13px";
    p.style.lineHeight = "1.35";
    p.textContent = "Use the “Additional notes” box to describe this feature in your own words.";
    content.appendChild(p);
    return;
  }
  if(sec.type === "palette"){
    content.appendChild(renderPalette(sec.key, !!sec.multi));
    return;
  }
  if(sec.type === "options"){
    content.appendChild(renderOptions(sec.key, sec.options || [], !!sec.multi));
    return;
  }
}

function renderGeneral(){
  const wrapper = document.createElement("div");
  wrapper.className = "fieldRow";

  const g = state.textInputs.general || {
    observer_name:"",
    date:"",
    specimen_number:"",
    location:"",
    gps_coordinates:""
  };

  wrapper.appendChild(makeField("Observer's Name", "text", g.observer_name, v => g.observer_name=v));
  wrapper.appendChild(makeField("Date", "date", g.date, v => g.date=v));
  wrapper.appendChild(makeField("Specimen Number", "text", g.specimen_number, v => g.specimen_number=v));
  wrapper.appendChild(makeField("Location", "text", g.location, v => g.location=v));
  wrapper.appendChild(makeField("GPS Coordinates", "text", g.gps_coordinates, v => g.gps_coordinates=v, "e.g., -28.12345, 153.12345"));

  const gpsBlock = document.createElement("div");
  const gpsLabel = document.createElement("label");
  gpsLabel.textContent = "GPS";
  const gpsRow = document.createElement("div");
  gpsRow.className = "gpsRow";

  const gpsBtn = document.createElement("button");
  gpsBtn.className = "btn secondary smallBtn";
  gpsBtn.textContent = "Use Current GPS";
  gpsBtn.onclick = (e) => {
    e.preventDefault();
    useCurrentGPS();
  };

  gpsRow.appendChild(gpsBtn);
  gpsBlock.appendChild(gpsLabel);
  gpsBlock.appendChild(gpsRow);

  const gpsStatus = document.createElement("div");
  gpsStatus.className = "gpsStatus";
  gpsStatus.textContent = state.gpsStatus || "You can enter a written location and optionally add GPS coordinates.";
  gpsBlock.appendChild(gpsStatus);

  wrapper.appendChild(gpsBlock);

  state.textInputs.general = g;
  return wrapper;
}

function makeField(labelText, type, value, setter, placeholder=""){
  const block = document.createElement("div");
  const label = document.createElement("label");
  label.textContent = labelText;
  const input = document.createElement("input");
  input.type = type;
  input.value = value || "";
  input.placeholder = placeholder || "";
  input.oninput = () => setter(input.value);
  block.appendChild(label);
  block.appendChild(input);
  return block;
}

function renderMeasureMM(key){
  const wrap = document.createElement("div");
  wrap.className = "fieldRow";
  const v = state.textInputs[key] || {min:"", max:""};

  const min = makeField("Minimum (mm)", "number", v.min, x => {v.min=x;});
  const max = makeField("Maximum (mm)", "number", v.max, x => {v.max=x;});
  wrap.appendChild(min);
  wrap.appendChild(max);

  state.textInputs[key] = v;
  return wrap;
}

function renderOptions(key, options, multi){
  const wrap = document.createElement("div");
  const grid = document.createElement("div");
  grid.className = "grid";

  const selectedArr = getArray(key);

  options.forEach(opt=>{
    const d = document.createElement("div");
    d.className = "opt";

    const isSelected = selectedArr.includes(opt.v);
    if(isSelected) d.classList.add("selected");

    const name = document.createElement("div");
    name.className = "optName";
    name.textContent = opt.v;

    const help = document.createElement("div");
    help.className = "optHelp";
    help.textContent = opt.h || "";

    d.appendChild(name);
    d.appendChild(help);

    d.onclick = () => {
      toggleSelection(key, opt.v, multi);

      if(key === "fungus_type" || key === "hymenium_type"){
        pruneInvalidSelections();
        clampStepIndex();
      }

      render();
    };

    grid.appendChild(d);
  });

  wrap.appendChild(grid);

  if(key === "cap_shape"){
    const preview = formatCapShapePreview();
    const help = document.createElement("div");
    help.className = "helperPreview";
    help.textContent = preview
      ? `Preview: ${preview}`
      : "Preview: select one or more stages to see how it will read.";
    wrap.appendChild(help);
  }

  return wrap;
}

function renderPalette(key, multi){
  const wrap = document.createElement("div");
  wrap.className = "paletteWrap";

  const pal = document.createElement("div");
  pal.className = "palette";

  const selectedArr = getArray(key);

  COLOURS.forEach(c=>{
    const s = document.createElement("div");
    s.className = "swatch";
    s.style.background = c.hex;

    if(selectedArr.includes(c.name)) s.classList.add("selected");

    s.title = c.name;

    s.onclick = () => {
      toggleSelection(key, c.name, multi);
      render();
    };

    pal.appendChild(s);
  });

  wrap.appendChild(pal);

  if(selectedArr.length){
    const label = document.createElement("div");
    label.className = "selectedColourText";
    label.textContent = "Selected: " + selectedArr.join("-");
    wrap.appendChild(label);
  }

  return wrap;
}

/* =========================
   SELECTIONS + PATHWAY SAFETY
========================= */

function toggleSelection(key, value, multi){
  const arr = getArray(key);
  const idx = arr.indexOf(value);

  if(multi){
    if(idx >= 0) arr.splice(idx,1);
    else arr.push(value);
  } else {
    arr.length = 0;
    arr.push(value);
  }

  state.skipped.delete(key);
}

function pruneInvalidSelections(){
  const flow = getFlow();
  const valid = new Set(flow.map(s=>s.key));

  for(const k of Object.keys(state.selections)){
    if(!valid.has(k)) delete state.selections[k];
  }
  for(const k of Object.keys(state.notes)){
    if(!valid.has(k)) delete state.notes[k];
  }
  for(const k of Object.keys(state.textInputs)){
    if(k === "general") continue;
    if(!valid.has(k)) delete state.textInputs[k];
  }
  for(const k of Array.from(state.skipped)){
    if(!valid.has(k)) state.skipped.delete(k);
  }
}

function clampStepIndex(){
  const flow = getFlow();
  if(state.stepIndex > flow.length - 1) state.stepIndex = flow.length - 1;
}

/* =========================
   NAVIGATION + NOTES
========================= */

function saveNotes(){
  const sec = currentSection();
  if(!sec) return;
  state.notes[sec.key] = document.getElementById("notes").value;
}

function skipSection(){
  const sec = currentSection();
  if(!sec) return;
  saveNotes();
  state.skipped.add(sec.key);
  state.selections[sec.key] = [];

  if(!isLastStep()){
    state.stepIndex++;
    render();
  }
}

function nextSection(){
  saveNotes();
  if(isLastStep()) return;
  state.stepIndex++;
  render();
}

function prevSection(){
  saveNotes();
  if(state.stepIndex === 0) return;
  state.stepIndex--;
  render();
}

function openConfirm(title, text, cb){
  confirmCallback = cb;
  document.getElementById("confirmTitle").textContent = title || "Confirm";
  document.getElementById("confirmText").textContent = text || "Are you sure?";
  document.getElementById("confirmOverlay").style.display = "flex";
}

function closeConfirm(result){
  document.getElementById("confirmOverlay").style.display = "none";
  const cb = confirmCallback;
  confirmCallback = null;
  if(typeof cb === "function") cb(!!result);
}

function startAgain(){
  openConfirm(
    "Start Again",
    "Start a new observation? This will clear the current unsaved observation.",
    (ok) => {
      if(!ok) return;

      state.stepIndex = 0;
      state.selections = {};
      state.textInputs = {};
      state.notes = {};
      state.skipped = new Set();
      state.gpsStatus = "";

      document.getElementById("output").style.display = "none";
      document.getElementById("output").textContent = "";
      document.getElementById("outputActions").style.display = "none";
      document.getElementById("finalBtns").style.display = "none";
      document.getElementById("notes").value = "";
      document.getElementById("start").style.display = "flex";
      render();
    }
  );
}

function useCurrentGPS(){
  if(!navigator.geolocation){
    state.gpsStatus = "Geolocation is not supported on this device/browser.";
    render();
    return;
  }

  state.gpsStatus = "Fetching current GPS…";
  render();

  navigator.geolocation.getCurrentPosition(
    (position) => {
      const lat = position.coords.latitude.toFixed(6);
      const lon = position.coords.longitude.toFixed(6);

      if(!state.textInputs.general){
        state.textInputs.general = {
          observer_name:"",
          date:"",
          specimen_number:"",
          location:"",
          gps_coordinates:""
        };
      }

      state.textInputs.general.gps_coordinates = `${lat}, ${lon}`;
      state.gpsStatus = "GPS coordinates added.";
      render();
    },
    (error) => {
      if(error.code === error.PERMISSION_DENIED){
        state.gpsStatus = "Location permission denied.";
      } else if(error.code === error.POSITION_UNAVAILABLE){
        state.gpsStatus = "Current position unavailable.";
      } else if(error.code === error.TIMEOUT){
        state.gpsStatus = "Location request timed out.";
      } else {
        state.gpsStatus = "Could not retrieve GPS coordinates.";
      }
      render();
    },
    {
      enableHighAccuracy: true,
      timeout: 12000,
      maximumAge: 0
    }
  );
}

/* =========================
   OUTPUT HELPERS
========================= */

const CAP_SHAPE_ORDER = [
  "Ovoid",
  "Conical",
  "Campanulate",
  "Parabolic",
  "Cylindric",
  "Convex",
  "Pulvinate",
  "Plane",
  "Depressed",
  "Umbonate"
];

function formatSelection(selections){
  return selections.join("-");
}

function showOutput(text){
  const box = document.getElementById("output");
  box.style.display = "block";
  box.textContent = text;

  const actions = document.getElementById("outputActions");
  actions.style.display = safeTrim(text) ? "block" : "none";
}

function currentOutputOrList(){
  const current = safeTrim(document.getElementById("output").textContent || "");
  if(current) return current;
  return generateListDescription();
}

function getSelections(key){
  return getArray(key).filter(v => v !== "None" && v !== "Not applicable");
}

function getNote(key){
  return safeTrim(state.notes[key] || "");
}

function lowerFirst(str){
  if(!str) return "";
  return str.charAt(0).toLowerCase() + str.slice(1);
}

function lowerSelections(key){
  return getSelections(key).map(v => lowerFirst(v));
}

function joinHuman(arr){
  const clean = arr.filter(Boolean);
  if(!clean.length) return "";
  if(clean.length === 1) return clean[0];
  if(clean.length === 2) return `${clean[0]} and ${clean[1]}`;
  return `${clean.slice(0, -1).join(", ")}, and ${clean[clean.length - 1]}`;
}

function measurementText(key, label="", diam=false){
  const m = state.textInputs[key] || {};
  const min = safeTrim(m.min || "");
  const max = safeTrim(m.max || "");
  if(!min && !max) return "";

  let core = "";
  if(min && max) core = `${min}–${max} mm`;
  else if(min) core = `${min} mm`;
  else if(max) core = `${max} mm`;

  if(label) return `${label} ${core}`;
  if(diam) return `${core} diam.`;
  return core;
}

function sentence(text){
  const t = safeTrim(text);
  if(!t) return "";
  return /[.!?]$/.test(t) ? t : `${t}.`;
}

function addSentence(arr, text){
  const s = sentence(text);
  if(s) arr.push(s);
}

function sortByOrder(values, order){
  const orderMap = new Map(order.map((v, i) => [v, i]));
  return [...values].sort((a, b) => {
    const ai = orderMap.has(a) ? orderMap.get(a) : 999;
    const bi = orderMap.has(b) ? orderMap.get(b) : 999;
    return ai - bi;
  });
}

function formatCapShapePreview(){
  const shapes = getSelections("cap_shape");
  if(!shapes.length) return "";
  const ordered = sortByOrder(shapes, CAP_SHAPE_ORDER).map(lowerFirst);

  if(ordered.length === 1) return ordered[0];
  if(ordered.length === 2) return `${ordered[0]} becoming ${ordered[1]}`;
  return `${ordered[0]} becoming ${ordered.slice(1).join(", then ")}`;
}

function formatColourPhrase(values){
  const arr = values.map(lowerFirst).filter(Boolean);
  if(!arr.length) return "";

  if(arr.length === 1) return arr[0];

  if(arr.length === 2){
    const [a,b] = arr;
    if(a.endsWith("ish")) return `${a} ${b}`;
    if(b.endsWith("ish")) return `${a} to ${b}`;
    return `${a} to ${b}`;
  }

  return joinHuman(arr);
}

function formatColourPhraseFromKey(key){
  return formatColourPhrase(getSelections(key));
}

function habitatPhrase(value){
  switch(value){
    case "Dry sclerophyll": return "dry sclerophyll forest";
    case "Wet sclerophyll": return "wet sclerophyll forest";
    case "Rainforest": return "rainforest";
    case "Pine forest": return "pine forest";
    case "Coastal heath": return "coastal heath";
    case "Urban": return "urban habitat";
    case "Alpine": return "alpine habitat";
    case "Other": return "other habitat";
    default: return lowerFirst(value);
  }
}

function substratePhrase(value){
  return lowerFirst(value);
}

function buildHabitatSentence(){
  const habitat = getSelections("habitat").map(habitatPhrase);
  const substrate = getSelections("substrate").map(substratePhrase);
  const trees = safeTrim(state.textInputs["trees"] || "");
  const g = state.textInputs.general || {};
  const location = safeTrim(g.location || "");
  const gps = safeTrim(g.gps_coordinates || "");

  const parts = [];

  if(substrate.length) parts.push(`on ${joinHuman(substrate)}`);
  if(habitat.length) parts.push(`in ${joinHuman(habitat)}`);
  if(trees) parts.push(`near ${trees}`);
  if(location) parts.push(`at ${location}`);
  if(gps) parts.push(`(${gps})`);

  if(!parts.length) return "";
  return `Growing ${parts.join(" ")}`;
}

function specimenCollectionSentence(){
  const collected = getSelections("specimen_collection");
  if(!collected.length) return "";
  return collected[0] === "Yes" ? "Specimen collected." : "Specimen not collected.";
}

function bruisingSentence(){
  const bruising = lowerSelections("bruising").filter(v => v !== "none");
  if(!bruising.length) return "";
  return sentence(`Bruising/staining ${joinHuman(bruising)}`);
}

function veilPhrase(){
  const partialVeil = getSelections("partial_veil");
  const volva = getSelections("volva");
  const parts = [];

  if(partialVeil.length && partialVeil[0] !== "None"){
    parts.push(`partial veil ${lowerFirst(partialVeil[0])}`);
  }
  if(volva.length && volva[0] !== "None"){
    parts.push(`volva ${lowerFirst(volva[0])}`);
  }

  return joinHuman(parts);
}

function lamellulaePhrase(){
  const val = getSelections("lamellulae")[0] || "";
  if(val === "Present (few)") return "with few lamellulae";
  if(val === "Present (many)") return "with many lamellulae";
  if(val === "Unsure") return "lamellulae uncertain";
  return "";
}

function lamellaeFeaturePhrase(){
  const feats = getSelections("lam_features");
  if(!feats.length) return "";

  const parts = [];
  const hasMarginate = feats.includes("Marginate");
  const hasSerrate = feats.includes("Serrate edge");

  if(hasMarginate || hasSerrate){
    const edgeBits = [];
    if(hasMarginate) edgeBits.push("marginate");
    if(hasSerrate) edgeBits.push("serrate");
    parts.push(`edge ${joinHuman(edgeBits)}`);
  }

  if(feats.includes("Anastomosing")) parts.push("lamellae anastomosing");
  if(feats.includes("Intervenose")) parts.push("with intervenose connections");
  if(feats.includes("Forked (furcate)")) parts.push("with forked lamellae");
  if(feats.includes("Pseudogills (ridges)")) parts.push("appearing as pseudogills");
  if(feats.includes("Inaequihymeniiferous")) parts.push("mottled from uneven spore release");

  return joinHuman(parts);
}

function buildAdditionalNotesSentence(excludeKeys = []){
  const flow = getFlow();
  const extraNotes = [];

  for(const sec of flow){
    const note = getNote(sec.key);
    if(note && !excludeKeys.includes(sec.key)){
      extraNotes.push(note);
    }
  }

  if(!extraNotes.length) return "";
  return sentence(`Additional notes: ${extraNotes.join("; ")}`);
}

function isNegativeSelectionValue(key, value){
  const v = safeTrim(value);
  if(!v) return true;

  const exactNegative = new Set([
    "None",
    "No",
    "Other",
    "Absent",
    "Not sure",
    "Unsure",
    "Not applicable",
    "Not seen",
    "Not checked",
    "No opening observed",
    "Absent / not obvious"
  ]);

  if(exactNegative.has(v)) return true;
  if(v.startsWith("No ")) return true;
  if(v.startsWith("Not ")) return true;

  return false;
}

function getPositiveSelectionsForList(key){
  return getArray(key).filter(v => !isNegativeSelectionValue(key, v));
}

/* =========================
   LIST DESCRIPTION
========================= */

function generateListDescription(){
  saveNotes();

  let lines = [];

  const g = state.textInputs.general || {};
  if(!isEmpty(g.observer_name)) lines.push(`Observer's name: ${safeTrim(g.observer_name)}`);
  if(!isEmpty(g.date)) lines.push(`Date: ${safeTrim(g.date)}`);
  if(!isEmpty(g.specimen_number)) lines.push(`Specimen number: ${safeTrim(g.specimen_number)}`);
  if(!isEmpty(g.location)) lines.push(`Location: ${safeTrim(g.location)}`);
  if(!isEmpty(g.gps_coordinates)) lines.push(`GPS coordinates: ${safeTrim(g.gps_coordinates)}`);
  if(lines.length) lines.push("");

  const flow = getFlow();
  const seen = new Set();

  for(const sec of flow){
    if(seen.has(sec.key)) continue;
    seen.add(sec.key);

    if(sec.key === "general") continue;

    if(sec.type === "text"){
      if(state.skipped.has(sec.key)) continue;
      const v = safeTrim(state.textInputs[sec.key] || "");
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(v) && isEmpty(note)) continue;
      const base = `${sec.title}: ${v || ""}`.trim();
      const suffix = note ? `. ${note}` : "";
      lines.push((base + suffix).trim());
      lines.push("");
      continue;
    }

    if(sec.type === "measure_mm"){
      if(state.skipped.has(sec.key)) continue;
      const m = state.textInputs[sec.key] || {};
      const min = safeTrim(m.min || "");
      const max = safeTrim(m.max || "");
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(min) && isEmpty(max) && isEmpty(note)) continue;

      let val = "";
      if(min && max) val = `${min}–${max} mm`;
      else if(min) val = `${min} mm`;
      else if(max) val = `${max} mm`;

      const base = `${sec.title}: ${val}`.trim();
      const suffix = note ? `. ${note}` : "";
      lines.push((base + suffix).trim());
      lines.push("");
      continue;
    }

    if(sec.type === "notes_only"){
      if(state.skipped.has(sec.key)) continue;
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(note)) continue;
      lines.push(`${sec.title}: ${note}`);
      lines.push("");
      continue;
    }

    const sel = getPositiveSelectionsForList(sec.key);

    if(state.skipped.has(sec.key) || !sel.length){
      const note = safeTrim(state.notes[sec.key] || "");
      if(!isEmpty(note)){
        lines.push(`${sec.title}: ${note}`);
        lines.push("");
      }
      continue;
    }

    let val = formatSelection(sel);
    if(sec.key === "cap_shape"){
      val = formatCapShapePreview() || val;
    }

    const note = safeTrim(state.notes[sec.key] || "");
    const suffix = note ? `. ${note}` : "";
    lines.push(`${sec.title}: ${val}${suffix}`);
    lines.push("");
  }

  const out = lines.join("\n").trim();
  showOutput(out || "No data recorded yet.");
  return out || "No data recorded yet.";
}

function buildMushroomWrittenDescription(){
  const paragraphs = [];

  const introBits = [];
  const growth = lowerSelections("growth_habit");
  const attachment = lowerSelections("fruit_attachment");
  if(growth.length) introBits.push(joinHuman(growth));
  if(attachment.length) introBits.push(joinHuman(attachment));
  addSentence(paragraphs, introBits.length ? `Fruiting bodies ${introBits.join(", ")}` : "");

  const pileusBits = [];
  const capSize = measurementText("cap_diameter", "", true);
  if(capSize) pileusBits.push(`Pileus ${capSize}`);
  const capShape = formatCapShapePreview();
  if(capShape) pileusBits.push(capShape);
  const capColour = formatColourPhraseFromKey("cap_colour");
  if(capColour) pileusBits.push(capColour);
  const capTexture = lowerSelections("cap_texture");
  if(capTexture.length) pileusBits.push(`surface ${joinHuman(capTexture)}`);
  const capOrnament = lowerSelections("cap_ornament");
  if(capOrnament.length) pileusBits.push(joinHuman(capOrnament));
  const capCuticle = lowerSelections("cap_cuticle");
  if(capCuticle.length) pileusBits.push(joinHuman(capCuticle));
  const capMargin = lowerSelections("cap_margin");
  if(capMargin.length) pileusBits.push(`margin ${joinHuman(capMargin)}`);
  addSentence(paragraphs, pileusBits.join(", "));

  const hym = getSingle("hymenium_type");
  if(hym === "Lamellae"){
    addSentence(paragraphs, "Hymenium lamellate");

    const lamBits = ["Lamellae"];
    const attach = lowerSelections("lam_attach");
    if(attach.length) lamBits.push(joinHuman(attach));
    const spacing = lowerSelections("lam_spacing");
    if(spacing.length) lamBits.push(joinHuman(spacing));
    const lamellulae = lamellulaePhrase();
    if(lamellulae) lamBits.push(lamellulae);

    const young = formatColourPhrase(getSelections("lam_young_colour"));
    const mature = formatColourPhrase(getSelections("lam_mature_colour"));
    if(young && mature) lamBits.push(`${young}, becoming ${mature}`);
    else if(young) lamBits.push(young);
    else if(mature) lamBits.push(mature);

    const lamFeat = lamellaeFeaturePhrase();
    if(lamFeat) lamBits.push(lamFeat);

    addSentence(paragraphs, lamBits.join(", "));
  }
  else if(hym === "Pores/Tubes"){
    addSentence(paragraphs, "Hymenium poroid");

    const poreBits = [];
    const shape = lowerSelections("pore_shape");
    if(shape.length) poreBits.push(`pores ${joinHuman(shape)}`);
    const density = getSelections("pore_density");
    if(density.length) poreBits.push(lowerFirst(density[0]));
    const surface = lowerSelections("pore_surface");
    if(surface.length) poreBits.push(`pore surface ${joinHuman(surface)}`);
    addSentence(paragraphs, poreBits.join(", "));
  }
  else if(hym === "Teeth/Spines"){
    addSentence(paragraphs, "Hymenium odontioid");

    const teethBits = [];
    const form = lowerSelections("teeth_form");
    if(form.length) teethBits.push(joinHuman(form));
    const colour = formatColourPhraseFromKey("teeth_colour");
    if(colour) teethBits.push(colour);
    addSentence(paragraphs, teethBits.join(", "));
  }
  else if(hym === "Ridges/Folds"){
    addSentence(paragraphs, "Hymenium with ridges and folds");

    const ridgeBits = [];
    const desc = lowerSelections("ridge_desc");
    if(desc.length) ridgeBits.push(joinHuman(desc));
    const colour = formatColourPhraseFromKey("ridge_colour");
    if(colour) ridgeBits.push(colour);
    addSentence(paragraphs, ridgeBits.join(", "));
  }

  const stipeBits = [];
  const stipeLen = measurementText("stipe_length");
  if(stipeLen) stipeBits.push(`Stipe ${stipeLen} long`);
  const stipePosition = lowerSelections("stipe_position");
  if(stipePosition.length) stipeBits.push(joinHuman(stipePosition));
  const stipeColour = formatColourPhraseFromKey("stipe_colour");
  if(stipeColour) stipeBits.push(stipeColour);
  const veil = veilPhrase();
  if(veil) stipeBits.push(veil);
  addSentence(paragraphs, stipeBits.join(", "));

  const spore = getSelections("spore_print");
  if(spore.length && spore[0] !== "Other"){
    addSentence(paragraphs, `Spore print ${lowerFirst(spore[0])}`);
  }

  const bruise = bruisingSentence();
  if(bruise) paragraphs.push(bruise);

  const odour = getNote("odour");
  if(odour) addSentence(paragraphs, `Odour ${odour}`);

  const habitat = buildHabitatSentence();
  if(habitat) paragraphs.push(sentence(habitat));

  const extraNotes = buildAdditionalNotesSentence(["odour"]);
  if(extraNotes) paragraphs.push(extraNotes);

  const collected = specimenCollectionSentence();
  if(collected) paragraphs.push(collected);

  return paragraphs.filter(Boolean).join("\n\n").trim();
}

========================= */

function generateWrittenDescription(){
  saveNotes();

  const type = getSingle("fungus_type");
  if(!type){
    showOutput("Choose a fungal type first.");
    return;
  }

  let out = "";

  if(type === "Mushrooms") out = buildMushroomWrittenDescription();
  else if(type === "Bracket / Polypore") out = buildBracketWrittenDescription();
  else if(type === "Coral / Club / Icicle") out = buildCoralWrittenDescription();
  else if(type === "Puffball / Earthball") out = buildPuffballWrittenDescription();
  else if(type === "Stinkhorn / Cage fungus") out = buildStinkhornWrittenDescription();
  else if(type === "Cups / Discs / Jellies") out = buildCupsJelliesWrittenDescription();
  else if(type === "Morels & allies") out = buildMorelsWrittenDescription();

  out = safeTrim(out) || "Not enough information yet to generate a written description.";
  showOutput(out);
  return out;
}

  }

/* =========================
   FORAY LOG
========================= */

function loadForayLog(){
  try{
    const raw = localStorage.getItem(FORAY_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch(e){
    return [];
  }
}

function saveForayLogArr(arr){
  try{
    localStorage.setItem(FORAY_STORAGE_KEY, JSON.stringify(arr));
  } catch(e){}
}

function saveToForayLog(){
  const description = currentOutputOrList();
  const g = state.textInputs.general || {};
  const now = new Date();
  const entry = {
    id: String(now.getTime()) + "_" + Math.random().toString(16).slice(2),
    createdAt: now.toISOString(),
    observer: safeTrim(g.observer_name || ""),
    date: safeTrim(g.date || ""),
    specimenNumber: safeTrim(g.specimen_number || ""),
    location: safeTrim(g.location || ""),
    gpsCoordinates: safeTrim(g.gps_coordinates || ""),
    fungusType: getSingle("fungus_type") || "",
    hymenium: getSingle("hymenium_type") || "",
    text: description
  };

  const log = loadForayLog();
  log.unshift(entry);
  saveForayLogArr(log);

  showOutput((description ? description + "\n\n" : "") + "Saved to Foray Log ✅");
}

function openForayLog(){
  renderForayLog();
  document.getElementById("forayModal").style.display = "flex";
}

function closeForayLog(){
  document.getElementById("forayModal").style.display = "none";
}

function renderForayLog(){
  const list = document.getElementById("forayList");
  const log = loadForayLog();
  list.innerHTML = "";

  if(!log.length){
    const empty = document.createElement("div");
    empty.style.color = "var(--muted)";
    empty.style.fontSize = "13px";
    empty.style.marginTop = "10px";
    empty.textContent = "No saved observations yet.";
    list.appendChild(empty);
    return;
  }

  log.forEach(item=>{
    const card = document.createElement("div");
    card.className = "logItem";

    const meta = document.createElement("div");
    meta.className = "logMeta";

    const parts = [];
    if(item.date) parts.push(`Date: ${item.date}`);
    if(item.specimenNumber) parts.push(`Specimen #: ${item.specimenNumber}`);
    if(item.location) parts.push(`Location: ${item.location}`);
    if(item.gpsCoordinates) parts.push(`GPS: ${item.gpsCoordinates}`);
    if(item.fungusType) parts.push(`Type: ${item.fungusType}`);
    if(item.hymenium) parts.push(`Hymenium: ${item.hymenium}`);
    parts.push(`Saved: ${new Date(item.createdAt).toLocaleString()}`);

    meta.textContent = parts.join(" • ");

    const text = document.createElement("div");
    text.className = "logText";
    text.textContent = item.text || "";

    const btns = document.createElement("div");
    btns.className = "logBtns";

    const copyBtn = document.createElement("button");
    copyBtn.className = "btn primary tiny";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = () => {
      const t = item.text || "";
      if(navigator.clipboard && t){
        navigator.clipboard.writeText(t).catch(()=>{});
      }
    };

    const openINatBtn = document.createElement("button");
    openINatBtn.className = "btn primary tiny";
    openINatBtn.textContent = "Open iNat";
    openINatBtn.onclick = () => {
      const t = item.text || "";
      if(navigator.clipboard && t){
        navigator.clipboard.writeText(t).catch(()=>{});
      }
      window.open("https://www.inaturalist.org/observations/new", "_blank");
    };

    const delBtn = document.createElement("button");
    delBtn.className = "btn secondary tiny";
    delBtn.textContent = "Delete";
    delBtn.onclick = () => {
      const updated = loadForayLog().filter(x => x.id !== item.id);
      saveForayLogArr(updated);
      renderForayLog();
    };

    btns.appendChild(copyBtn);
    btns.appendChild(openINatBtn);
    btns.appendChild(delBtn);

    card.appendChild(meta);
    card.appendChild(text);
    card.appendChild(btns);

    list.appendChild(card);
  });
}

function exportForayLog(){
  const log = loadForayLog();
  if(!log.length){
    alert("Foray Log is empty.");
    return;
  }
  const text = log.map((item, idx) => {
    const headerParts = [];
    if(item.date) headerParts.push(`Date: ${item.date}`);
    if(item.specimenNumber) headerParts.push(`Specimen #: ${item.specimenNumber}`);
    if(item.location) headerParts.push(`Location: ${item.location}`);
    if(item.gpsCoordinates) headerParts.push(`GPS: ${item.gpsCoordinates}`);
    if(item.fungusType) headerParts.push(`Type: ${item.fungusType}`);
    if(item.hymenium) headerParts.push(`Hymenium: ${item.hymenium}`);
    headerParts.push(`Saved: ${new Date(item.createdAt).toLocaleString()}`);
    return `--- Observation ${idx+1} ---\n${headerParts.join(" • ")}\n\n${item.text || ""}\n`;
  }).join("\n");

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      alert("Export copied to clipboard ✅");
    }).catch(()=>{
      alert("Could not copy. You can still select & copy from the log entries.");
    });
  } else {
    alert("Clipboard not available on this device/browser.");
  }
}

function clearForayLog(){
  openConfirm(
    "Clear Foray Log",
    "Clear the entire Foray Log on this device?",
    (ok) => {
      if(!ok) return;
      saveForayLogArr([]);
      renderForayLog();
    }
  );
}

========================= */

document.getElementById("confirmOverlay").addEventListener("click", (e) => {
  if(e.target.id === "confirmOverlay") closeConfirm(false);
});

render();
