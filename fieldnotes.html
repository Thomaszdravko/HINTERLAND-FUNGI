<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mushroom Documentation Tool</title>

<style>
  :root{
    --bgOverlay: rgba(0,0,0,0.62);
    --panel: rgba(20,20,20,0.88);
    --panel2: rgba(30,30,30,0.88);
    --text: #F2F2F2;
    --muted: #B9B9B9;
    --accent: #B9C8A0;      /* pastel light olive green */
    --accent2:#9EAF86;
    --border: rgba(255,255,255,0.14);
  }

  * { box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background: url("background.jpeg") center/cover no-repeat fixed;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background: var(--bgOverlay);
    z-index:-1;
  }

  .wrap{
    width:min(980px, 94vw);
    margin: 18px auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    backdrop-filter: blur(6px);
  }

  h1{
    margin: 0 0 8px 0;
    text-align:center;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 18px;
  }

  .topbar{
    display:flex;
    justify-content: space-between;
    align-items:flex-start;
    gap: 12px;
    margin-top: 6px;
  }

  .titleBlock{ flex: 1; min-width: 0; }
  .sectionTitle{
    margin:0;
    color: var(--accent);
    text-transform: uppercase;
    font-size: 16px;
    line-height: 1.2;
  }
  .sectionSubtitle{
    margin-top: 6px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.25;
  }

  .btn{
    border: none;
    border-radius: 12px;
    padding: 11px 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btnRow{
    display:flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .btn.secondary{ background: #2F2F2F; color: var(--text); border:1px solid var(--border); }
  .btn.secondary:hover{ background:#3A3A3A; }
  .btn.primary{ background: var(--accent); color: #101010; }
  .btn.primary:hover{ background: var(--accent2); }

  .smallBtn{
    white-space: nowrap;
    width: auto;
    padding: 10px 12px;
  }

  .card{
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-top: 12px;
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(3, 1fr); /* 3 per row */
    gap: 10px;
    margin-top: 10px;
  }

  @media (max-width: 520px){
    .grid{ grid-template-columns: repeat(2, 1fr); } /* smaller phones */
  }

  .opt{
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px;
    background: rgba(255,255,255,0.04);
    cursor: pointer;
    transition: 0.12s ease;
    min-height: 74px;
    display:flex;
    flex-direction: column;
    justify-content: center;
  }
  .opt:hover{ border-color: var(--accent); }
  .opt.selected{
    border-color: var(--accent);
    background: rgba(185,200,160,0.14);
  }
  .optName{
    font-weight: 800;
    font-size: 13px;
    line-height: 1.2;
  }
  .optHelp{
    margin-top: 6px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.2;
  }

  .fieldRow{
    display:grid;
    grid-template-columns: 1fr;
    gap: 10px;
    margin-top: 10px;
  }
  label{
    font-size: 12px;
    color: var(--muted);
  }
  input, textarea, select{
    width: 100%;
    padding: 11px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(0,0,0,0.35);
    color: var(--text);
    outline: none;
    font-size: 14px;
  }

  textarea{
    min-height: 82px;
    resize: vertical;
  }

  .notesLabel{
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  #output{
    display:none;
    white-space: pre-wrap;
    background: rgba(0,0,0,0.35);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    margin-top: 12px;
    font-size: 13px;
    line-height: 1.35;
  }

  /* START SCREEN */
  .start{
    position: fixed; inset: 0;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 18px;
    background: rgba(0,0,0,0.70);
    z-index: 10;
  }
  .startCard{
    width: min(520px, 92vw);
    background: rgba(20,20,20,0.92);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    text-align:center;
  }
  .startCard img{
    width: min(220px, 64vw);
    height: auto;
    display:block;
    margin: 6px auto 14px auto;
  }
  .startHint{
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 14px;
  }

  /* PALETTE */
  .paletteWrap{
    margin-top: 10px;
  }
  .palette{
    display:grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 8px;
  }
  @media (max-width: 520px){
    .palette{ grid-template-columns: repeat(6, 1fr); }
  }
  .swatch{
    aspect-ratio: 1 / 1;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.25);
    cursor:pointer;
  }
  .swatch.selected{
    outline: 3px solid var(--accent);
    border-color: rgba(255,255,255,0.35);
  }
  .selectedColourText{
    margin-top: 10px;
    color: var(--accent);
    font-weight: 800;
    font-size: 13px;
  }

  /* FORAY LOG MODAL */
  .modal{
    position: fixed; inset: 0;
    display:none;
    align-items:center;
    justify-content:center;
    padding: 18px;
    background: rgba(0,0,0,0.70);
    z-index: 20;
  }
  .modalCard{
    width: min(880px, 94vw);
    max-height: min(82vh, 820px);
    overflow: auto;
    background: rgba(20,20,20,0.92);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 14px;
  }
  .modalHead{
    display:flex;
    align-items:center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .modalTitle{
    margin:0;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 14px;
  }
  .logItem{
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    background: rgba(255,255,255,0.04);
    margin-top: 10px;
  }
  .logMeta{
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
    line-height: 1.25;
  }
  .logText{
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.35;
  }
  .logBtns{
    display:flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .btn.tiny{
    width: auto;
    padding: 9px 11px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 800;
  }
</style>
</head>

<body>

<div class="start" id="start">
  <div class="startCard">
    <img src="logo.png" alt="Logo" />
    <div class="startHint">Document a fungus observation step-by-step. Works best on mobile.</div>
    <button class="btn primary" onclick="begin()">Begin</button>
  </div>
</div>

<!-- FORAY LOG MODAL -->
<div class="modal" id="forayModal">
  <div class="modalCard">
    <div class="modalHead">
      <h3 class="modalTitle">Foray Log</h3>
      <button class="btn secondary smallBtn" onclick="closeForayLog()">Close</button>
    </div>

    <div class="btnRow" style="margin-top:0;">
      <button class="btn secondary" onclick="exportForayLog()">Export All (Copy)</button>
      <button class="btn secondary" onclick="clearForayLog()">Clear Log</button>
    </div>

    <div id="forayList"></div>
  </div>
</div>

<div class="wrap">
  <h1>Mushroom Documentation Tool</h1>

  <div class="topbar">
    <div class="titleBlock">
      <h2 class="sectionTitle" id="sectionTitle">Loading…</h2>
      <div class="sectionSubtitle" id="sectionSubtitle"></div>
    </div>
    <button class="btn secondary smallBtn" id="skipBtn" onclick="skipSection()">Skip</button>
  </div>

  <div class="card" id="content"></div>

  <div class="notesLabel">Additional notes</div>
  <textarea id="notes" placeholder="Additional notes"></textarea>

  <div class="btnRow">
    <button class="btn secondary" id="prevBtn" onclick="prevSection()">Previous</button>
    <button class="btn primary" id="nextBtn" onclick="nextSection()">Next</button>
  </div>

  <div id="output"></div>

  <div class="btnRow" id="finalBtns" style="display:none;">
    <button class="btn primary" onclick="generateListDescription()">Generate List Description</button>
    <button class="btn primary" onclick="generateWrittenDescription()">Generate Written Description</button>
    <button class="btn primary" onclick="saveToForayLog()">Save to Foray Log</button>
    <button class="btn primary" onclick="openForayLog()">View Foray Log</button>
    <button class="btn primary" onclick="copyAndOpenINat()">Copy & Open iNaturalist</button>
  </div>
</div>

<script>

const FORAY_STORAGE_KEY = "mushroom_foray_log_v1";

/* =========================
   FLOW COMPUTATION
========================= */

function getArray(key){
  if(!state.selections[key]) state.selections[key] = [];
  if(!Array.isArray(state.selections[key])) state.selections[key] = [];
  return state.selections[key];
}
function getSingle(key){
  const arr = getArray(key);
  return arr.length ? arr[arr.length-1] : "";
}

function getFlow(){
  const flow = [];
  flow.push(...GENERAL);
  flow.push(...FUNGUS_TYPE);
  flow.push(...UNIVERSAL_ENV);

  const type = getSingle("fungus_type");

  if(type === "Mushroom (cap + stem)"){
    flow.push(...MUSHROOM_PRE);

    const hym = getSingle("hymenium_type");
    if(hym === "Lamellae") flow.push(...LAM);
    if(hym === "Pores/Tubes") flow.push(...POR);
    if(hym === "Teeth/Spines") flow.push(...TEETH);
    if(hym === "Ridges/Folds") flow.push(...RIDGES);

    flow.push(...MUSHROOM_COMMON);
  }
  else if(type === "Bracket / Polypore"){
    flow.push(...BRACKET);
  }
  else if(type === "Coral / Club / Icicle"){
    flow.push(...CORAL);
  }
  else if(type === "Puffball / Earthball"){
    flow.push(...PUFFBALL);
  }
  else if(type === "Stinkhorn / Cage fungus"){
    flow.push(...STINKHORN);
  }
  else if(type === "Cups / Discs / Jellies"){
    flow.push(...CUPS_JELLIES);
  }
  else if(type === "Morels & allies"){
    flow.push(...MORELS);
  }

  return flow;
}

function currentSection(){
  const flow = getFlow();
  return flow[state.stepIndex] || null;
}
function isLastStep(){
  const flow = getFlow();
  return state.stepIndex >= flow.length - 1;
}

/* =========================
   RENDERING
========================= */

function begin(){
  document.getElementById("start").style.display = "none";

  if(!state.textInputs.general){
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth()+1).padStart(2,"0");
    const dd = String(now.getDate()).padStart(2,"0");
    state.textInputs.general = {
      observer_name:"",
      date:`${yyyy}-${mm}-${dd}`,
      location:"",
      specimen_number:""
    };
  }
  render();
}

function render(){
  const sec = currentSection();
  if(!sec) return;

  if(sec.key === "volva"){
    const pv = getSingle("partial_veil");
    if(pv === "Cortina" || pv === "Remnants only"){
      state.skipped.add("volva");
      state.selections["volva"] = [];
      if(!isLastStep()){
        state.stepIndex++;
        render();
        return;
      }
    }
  }

  document.getElementById("sectionTitle").innerText = sec.title;
  document.getElementById("sectionSubtitle").innerText = sec.subtitle || "";

  document.getElementById("skipBtn").style.display = "inline-block";
  document.getElementById("prevBtn").style.visibility = state.stepIndex === 0 ? "hidden" : "visible";
  document.getElementById("nextBtn").style.display = isLastStep() ? "none" : "inline-block";
  document.getElementById("finalBtns").style.display = isLastStep() ? "flex" : "none";

  document.getElementById("notes").value = state.notes[sec.key] || "";

  const content = document.getElementById("content");
  content.innerHTML = "";

  if(sec.type === "general"){
    content.appendChild(renderGeneral());
    return;
  }
  if(sec.type === "text"){
    const wrapper = document.createElement("div");
    wrapper.className = "fieldRow";
    const label = document.createElement("label");
    label.textContent = "Text entry";
    const input = document.createElement("input");
    input.type = "text";
    input.placeholder = sec.placeholder || "";
    input.value = state.textInputs[sec.key] || "";
    input.oninput = () => { state.textInputs[sec.key] = input.value; };
    wrapper.appendChild(label);
    wrapper.appendChild(input);
    content.appendChild(wrapper);
    return;
  }
  if(sec.type === "measure_mm"){
    content.appendChild(renderMeasureMM(sec.key));
    return;
  }
  if(sec.type === "notes_only"){
    const p = document.createElement("div");
    p.style.color = "var(--muted)";
    p.style.fontSize = "13px";
    p.style.lineHeight = "1.35";
    p.textContent = "Use the “Additional notes” box to describe this feature in your own words.";
    content.appendChild(p);
    return;
  }
  if(sec.type === "palette"){
    content.appendChild(renderPalette(sec.key, !!sec.multi));
    return;
  }
  if(sec.type === "options"){
    content.appendChild(renderOptions(sec.key, sec.options || [], !!sec.multi));
    return;
  }
}

function renderGeneral(){
  const wrapper = document.createElement("div");
  wrapper.className = "fieldRow";

  const g = state.textInputs.general || {observer_name:"", date:"", location:"", specimen_number:""};

  wrapper.appendChild(makeField("Observer's Name", "text", g.observer_name, v => g.observer_name=v));
  wrapper.appendChild(makeField("Date", "date", g.date, v => g.date=v));
  wrapper.appendChild(makeField("Location", "text", g.location, v => g.location=v));
  wrapper.appendChild(makeField("Specimen Number", "text", g.specimen_number, v => g.specimen_number=v));

  state.textInputs.general = g;
  return wrapper;
}

function makeField(labelText, type, value, setter){
  const block = document.createElement("div");
  const label = document.createElement("label");
  label.textContent = labelText;
  const input = document.createElement("input");
  input.type = type;
  input.value = value || "";
  input.oninput = () => setter(input.value);
  block.appendChild(label);
  block.appendChild(input);
  return block;
}

function renderMeasureMM(key){
  const wrap = document.createElement("div");
  wrap.className = "fieldRow";
  const v = state.textInputs[key] || {min:"", max:""};

  const min = makeField("Minimum (mm)", "number", v.min, x => {v.min=x;});
  const max = makeField("Maximum (mm)", "number", v.max, x => {v.max=x;});
  wrap.appendChild(min);
  wrap.appendChild(max);

  state.textInputs[key] = v;
  return wrap;
}

function renderOptions(key, options, multi){
  const grid = document.createElement("div");
  grid.className = "grid";

  const selectedArr = getArray(key);

  options.forEach(opt=>{
    const d = document.createElement("div");
    d.className = "opt";

    const isSelected = selectedArr.includes(opt.v);
    if(isSelected) d.classList.add("selected");

    const name = document.createElement("div");
    name.className = "optName";
    name.textContent = opt.v;

    const help = document.createElement("div");
    help.className = "optHelp";
    help.textContent = opt.h || "";

    d.appendChild(name);
    d.appendChild(help);

    d.onclick = () => {
      toggleSelection(key, opt.v, multi);

      if(key === "fungus_type" || key === "hymenium_type"){
        pruneInvalidSelections();
        clampStepIndex();
      }

      render();
    };

    grid.appendChild(d);
  });

  return grid;
}

function renderPalette(key, multi){
  const wrap = document.createElement("div");
  wrap.className = "paletteWrap";

  const pal = document.createElement("div");
  pal.className = "palette";

  const selectedArr = getArray(key);

  COLOURS.forEach(c=>{
    const s = document.createElement("div");
    s.className = "swatch";
    s.style.background = c.hex;

    if(selectedArr.includes(c.name)) s.classList.add("selected");

    s.title = c.name;

    s.onclick = () => {
      toggleSelection(key, c.name, multi);
      render();
    };

    pal.appendChild(s);
  });

  wrap.appendChild(pal);

  if(selectedArr.length){
    const label = document.createElement("div");
    label.className = "selectedColourText";
    label.textContent = "Selected: " + selectedArr.join("-");
    wrap.appendChild(label);
  }

  return wrap;
}

/* =========================
   SELECTIONS + PATHWAY SAFETY
========================= */

function toggleSelection(key, value, multi){
  const arr = getArray(key);
  const idx = arr.indexOf(value);

  if(multi){
    if(idx >= 0) arr.splice(idx,1);
    else arr.push(value);
  } else {
    arr.length = 0;
    arr.push(value);
  }

  state.skipped.delete(key);
}

function pruneInvalidSelections(){
  const flow = getFlow();
  const valid = new Set(flow.map(s=>s.key));

  for(const k of Object.keys(state.selections)){
    if(!valid.has(k)) delete state.selections[k];
  }
  for(const k of Object.keys(state.notes)){
    if(!valid.has(k)) delete state.notes[k];
  }
  for(const k of Object.keys(state.textInputs)){
    if(k === "general") continue;
    if(!valid.has(k)) delete state.textInputs[k];
  }
  for(const k of Array.from(state.skipped)){
    if(!valid.has(k)) state.skipped.delete(k);
  }
}

function clampStepIndex(){
  const flow = getFlow();
  if(state.stepIndex > flow.length - 1) state.stepIndex = flow.length - 1;
}

/* =========================
   NAVIGATION + NOTES
========================= */

function saveNotes(){
  const sec = currentSection();
  if(!sec) return;
  state.notes[sec.key] = document.getElementById("notes").value;
}

function skipSection(){
  const sec = currentSection();
  if(!sec) return;
  saveNotes();
  state.skipped.add(sec.key);
  state.selections[sec.key] = [];

  if(!isLastStep()){
    state.stepIndex++;
    render();
  }
}

function nextSection(){
  saveNotes();
  if(isLastStep()) return;
  state.stepIndex++;
  render();
}

function prevSection(){
  saveNotes();
  if(state.stepIndex === 0) return;
  state.stepIndex--;
  render();
}

/* =========================
   OUTPUT HELPERS
========================= */

function shouldOmitSelection(key, selections){
  if(state.skipped.has(key)) return true;
  if(!selections || !selections.length) return true;
  if(selections.length === 1 && selections[0] === "None") return true;
  return false;
}

function formatSelection(selections){
  return selections.join("-");
}

function showOutput(text){
  const box = document.getElementById("output");
  box.style.display = "block";
  box.textContent = text;
}

function currentOutputOrList(){
  const current = safeTrim(document.getElementById("output").textContent || "");
  if(current) return current;
  return generateListDescription();
}

function getSelections(key){
  return getArray(key).filter(v => v !== "None" && v !== "Not applicable");
}

function getNote(key){
  return safeTrim(state.notes[key] || "");
}

function lowerFirst(str){
  if(!str) return "";
  return str.charAt(0).toLowerCase() + str.slice(1);
}

function lowerSelections(key){
  return getSelections(key).map(v => lowerFirst(v));
}

function joinHuman(arr){
  const clean = arr.filter(Boolean);
  if(!clean.length) return "";
  if(clean.length === 1) return clean[0];
  if(clean.length === 2) return `${clean[0]} and ${clean[1]}`;
  return `${clean.slice(0, -1).join(", ")}, and ${clean[clean.length - 1]}`;
}

function measurementText(key, label="", diam=false){
  const m = state.textInputs[key] || {};
  const min = safeTrim(m.min || "");
  const max = safeTrim(m.max || "");
  if(!min && !max) return "";

  let core = "";
  if(min && max) core = `${min}–${max} mm`;
  else if(min) core = `${min} mm`;
  else if(max) core = `${max} mm`;

  if(label) return `${label} ${core}`;
  if(diam) return `${core} diam.`;
  return core;
}

function sentence(text){
  const t = safeTrim(text);
  if(!t) return "";
  return /[.!?]$/.test(t) ? t : `${t}.`;
}

function addSentence(arr, text){
  const s = sentence(text);
  if(s) arr.push(s);
}

function buildHabitatSentence(){
  const parts = [];
  const habitat = lowerSelections("habitat");
  const substrate = lowerSelections("substrate");
  const trees = safeTrim(state.textInputs["trees"] || "");

  if(habitat.length) parts.push(`in ${joinHuman(habitat)}`);
  if(substrate.length) parts.push(`on ${joinHuman(substrate)}`);
  if(trees) parts.push(`near ${trees}`);

  if(!parts.length) return "";
  return `Growing ${parts.join(" ")}`;
}

/* =========================
   LIST DESCRIPTION
========================= */

function generateListDescription(){
  saveNotes();

  let lines = [];

  const g = state.textInputs.general || {};
  if(!isEmpty(g.observer_name)) lines.push(`Observer's name: ${safeTrim(g.observer_name)}`);
  if(!isEmpty(g.date)) lines.push(`Date: ${safeTrim(g.date)}`);
  if(!isEmpty(g.location)) lines.push(`Location: ${safeTrim(g.location)}`);
  if(!isEmpty(g.specimen_number)) lines.push(`Specimen number: ${safeTrim(g.specimen_number)}`);
  if(lines.length) lines.push("");

  const flow = getFlow();
  const seen = new Set();

  for(const sec of flow){
    if(seen.has(sec.key)) continue;
    seen.add(sec.key);

    if(sec.key === "general") continue;

    if(sec.type === "text"){
      if(state.skipped.has(sec.key)) continue;
      const v = safeTrim(state.textInputs[sec.key] || "");
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(v) && isEmpty(note)) continue;
      const base = `${sec.title}: ${v || ""}`.trim();
      const suffix = note ? `. ${note}` : "";
      lines.push((base + suffix).trim());
      lines.push("");
      continue;
    }

    if(sec.type === "measure_mm"){
      if(state.skipped.has(sec.key)) continue;
      const m = state.textInputs[sec.key] || {};
      const min = safeTrim(m.min || "");
      const max = safeTrim(m.max || "");
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(min) && isEmpty(max) && isEmpty(note)) continue;

      let val = "";
      if(min && max) val = `${min}–${max} mm`;
      else if(min) val = `${min} mm`;
      else if(max) val = `${max} mm`;

      const base = `${sec.title}: ${val}`.trim();
      const suffix = note ? `. ${note}` : "";
      lines.push((base + suffix).trim());
      lines.push("");
      continue;
    }

    if(sec.type === "notes_only"){
      if(state.skipped.has(sec.key)) continue;
      const note = safeTrim(state.notes[sec.key] || "");
      if(isEmpty(note)) continue;
      lines.push(`${sec.title}: ${note}`);
      lines.push("");
      continue;
    }

    const sel = getArray(sec.key);
    if(shouldOmitSelection(sec.key, sel)){
      const note = safeTrim(state.notes[sec.key] || "");
      if(!isEmpty(note)){
        lines.push(`${sec.title}: ${note}`);
        lines.push("");
      }
      continue;
    }

    const val = formatSelection(sel);
    const note = safeTrim(state.notes[sec.key] || "");
    const suffix = note ? `. ${note}` : "";
    lines.push(`${sec.title}: ${val}${suffix}`);
    lines.push("");
  }

  const out = lines.join("\n").trim();
  showOutput(out || "No data recorded yet.");
  return out || "No data recorded yet.";
}

/* =========================
   WRITTEN DESCRIPTION
========================= */

function generateWrittenDescription(){
  saveNotes();

  const type = getSingle("fungus_type");
  const paragraphs = [];

  if(!type){
    showOutput("Choose a fungal type first.");
    return;
  }

  if(type === "Mushroom (cap + stem)"){
    const p1 = [];

    const pileusBits = [];
    const capSize = measurementText("cap_diameter", "", true);
    if(capSize) pileusBits.push(`Pileus ${capSize}`);
    const capShape = lowerSelections("cap_shape");
    if(capShape.length) pileusBits.push(joinHuman(capShape));
    const capTexture = lowerSelections("cap_texture");
    if(capTexture.length) pileusBits.push(`surface ${joinHuman(capTexture)}`);
    const capOrnament = lowerSelections("cap_ornament");
    if(capOrnament.length) pileusBits.push(joinHuman(capOrnament));
    const capCuticle = lowerSelections("cap_cuticle");
    if(capCuticle.length) pileusBits.push(joinHuman(capCuticle));
    const capColour = lowerSelections("cap_colour");
    if(capColour.length) pileusBits.push(`${joinHuman(capColour)}`);
    const capMargin = lowerSelections("cap_margin");
    if(capMargin.length) pileusBits.push(`margin ${joinHuman(capMargin)}`);
    addSentence(p1, pileusBits.join(", "));

    const hym = getSingle("hymenium_type");
    if(hym === "Lamellae"){
      const lamBits = ["Lamellae"];
      const attach = lowerSelections("lam_attach");
      if(attach.length) lamBits.push(joinHuman(attach));
      const spacing = lowerSelections("lam_spacing");
      if(spacing.length) lamBits.push(joinHuman(spacing));
      const lamellulae = getSelections("lamellulae");
      if(lamellulae.length && lamellulae[0] !== "Absent / not obvious"){
        lamBits.push(lowerFirst(lamellulae[0]));
      }
      const young = lowerSelections("lam_young_colour");
      const mature = lowerSelections("lam_mature_colour");
      if(young.length && mature.length) lamBits.push(`initially ${joinHuman(young)}, becoming ${joinHuman(mature)}`);
      else if(young.length) lamBits.push(joinHuman(young));
      else if(mature.length) lamBits.push(joinHuman(mature));
      const lamFeatures = lowerSelections("lam_features");
      if(lamFeatures.length) lamBits.push(joinHuman(lamFeatures));
      addSentence(p1, lamBits.join(", "));
    }
    else if(hym === "Pores/Tubes"){
      const poreBits = ["Hymenophore poroid"];
      const shape = lowerSelections("pore_shape");
      if(shape.length) poreBits.push(`pores ${joinHuman(shape)}`);
      const density = getSelections("pore_density");
      if(density.length) poreBits.push(lowerFirst(density[0]));
      const surface = lowerSelections("pore_surface");
      if(surface.length) poreBits.push(`pore surface ${joinHuman(surface)}`);
      addSentence(p1, poreBits.join(", "));
    }
    else if(hym === "Teeth/Spines"){
      const teethBits = ["Hymenophore toothed"];
      const form = lowerSelections("teeth_form");
      if(form.length) teethBits.push(joinHuman(form));
      const colour = lowerSelections("teeth_colour");
      if(colour.length) teethBits.push(joinHuman(colour));
      addSentence(p1, teethBits.join(", "));
    }
    else if(hym === "Ridges/Folds"){
      const ridgeBits = ["Hymenophore with ridges/folds"];
      const desc = lowerSelections("ridge_desc");
      if(desc.length) ridgeBits.push(joinHuman(desc));
      const colour = lowerSelections("ridge_colour");
      if(colour.length) ridgeBits.push(joinHuman(colour));
      addSentence(p1, ridgeBits.join(", "));
    }

    const stipeBits = [];
    const stipeLen = measurementText("stipe_length", "Stipe");
    if(stipeLen) stipeBits.push(stipeLen);
    const stipeColour = lowerSelections("stipe_colour");
    if(stipeColour.length) stipeBits.push(joinHuman(stipeColour));
    const stipePosition = lowerSelections("stipe_position");
    if(stipePosition.length) stipeBits.push(joinHuman(stipePosition));
    const partialVeil = getSelections("partial_veil");
    if(partialVeil.length && partialVeil[0] !== "None"){
      stipeBits.push(`partial veil ${lowerFirst(partialVeil[0])}`);
    }
    const volva = getSelections("volva");
    if(volva.length && volva[0] !== "None"){
      stipeBits.push(`volva ${lowerFirst(volva[0])}`);
    }
    addSentence(p1, stipeBits.join(", "));

    const miscBits = [];
    const spore = getSelections("spore_print");
    if(spore.length && spore[0] !== "Other"){
      miscBits.push(`spore print ${lowerFirst(spore[0])}`);
    }
    const bruising = lowerSelections("bruising");
    if(bruising.length && !bruising.includes("none")){
      miscBits.push(`bruising/staining ${joinHuman(bruising)}`);
    }
    const odour = getNote("odour");
    if(odour) miscBits.push(`odour ${odour}`);
    addSentence(p1, miscBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Bracket / Polypore"){
    const p1 = [];

    const upperBits = ["Basidiome"];
    const form = lowerSelections("bracket_form");
    if(form.length) upperBits.push(joinHuman(form));
    const margin = lowerSelections("bracket_margin");
    if(margin.length) upperBits.push(`margin ${joinHuman(margin)}`);
    const surface = lowerSelections("bracket_surface");
    if(surface.length) upperBits.push(`upper surface ${joinHuman(surface)}`);
    const colour = lowerSelections("bracket_colour");
    if(colour.length) upperBits.push(joinHuman(colour));
    addSentence(p1, upperBits.join(", "));

    const poreBits = [];
    const shape = lowerSelections("pore_shape");
    if(shape.length) poreBits.push(`pores ${joinHuman(shape)}`);
    const density = getSelections("pore_density");
    if(density.length) poreBits.push(lowerFirst(density[0]));
    const poreColour = lowerSelections("pore_colour");
    if(poreColour.length) poreBits.push(`pore surface ${joinHuman(poreColour)}`);
    const guttation = getSelections("guttation");
    if(guttation.length && guttation[0] === "Present"){
      poreBits.push("guttation present");
    }
    addSentence(p1, poreBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Coral / Club / Icicle"){
    const p1 = [];

    addSentence(p1, `Fungal type ${type.toLowerCase()}`);

    const coralBits = [];
    const form = getSelections("coral_form");
    if(form.length) coralBits.push(lowerFirst(form[0]));
    const branching = getSelections("coral_branching");
    if(branching.length) coralBits.push(`branching ${lowerFirst(branching[0])}`);
    const tips = getSelections("coral_tips");
    if(tips.length) coralBits.push(`branch tips ${lowerFirst(tips[0])}`);
    const texture = getSelections("coral_texture");
    if(texture.length) coralBits.push(`surface ${lowerFirst(texture[0])}`);
    const colour = lowerSelections("coral_colour");
    if(colour.length) coralBits.push(joinHuman(colour));
    addSentence(p1, coralBits.join(", "));

    const extraBits = [];
    const bruising = lowerSelections("bruising");
    if(bruising.length && !bruising.includes("none")){
      extraBits.push(`bruising/staining ${joinHuman(bruising)}`);
    }
    const guttation = getSelections("guttation");
    if(guttation.length && guttation[0] === "Present"){
      extraBits.push("guttation present");
    }
    addSentence(p1, extraBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Puffball / Earthball"){
    const p1 = [];

    const outerBits = [];
    const form = getSelections("puff_form");
    if(form.length) outerBits.push(lowerFirst(form[0]));
    const peridium = getSelections("peridium");
    if(peridium.length) outerBits.push(`peridium ${lowerFirst(peridium[0])}`);
    const colour = lowerSelections("puff_surface_colour");
    if(colour.length) outerBits.push(joinHuman(colour));
    addSentence(p1, outerBits.join(", "));

    const innerBits = [];
    const opening = getSelections("puff_opening");
    if(opening.length) innerBits.push(`opening by ${lowerFirst(opening[0])}`);
    const gleba = getSelections("gleba");
    if(gleba.length) innerBits.push(`gleba ${lowerFirst(gleba[0])}`);
    addSentence(p1, innerBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Stinkhorn / Cage fungus"){
    const p1 = [];

    const formBits = [];
    const egg = getSelections("egg_present");
    if(egg.length) formBits.push(`egg stage ${lowerFirst(egg[0])}`);
    const form = getSelections("stink_form");
    if(form.length) formBits.push(`receptacle ${lowerFirst(form[0])}`);
    const gleba = getSelections("gleba_colour");
    if(gleba.length) formBits.push(`gleba ${lowerFirst(gleba[0])}`);
    addSentence(p1, formBits.join(", "));

    const extraBits = [];
    const odour = getNote("odour");
    if(odour) extraBits.push(`odour ${odour}`);
    const volva = getSelections("volva");
    if(volva.length && volva[0] !== "Absent"){
      extraBits.push(`volva ${lowerFirst(volva[0])}`);
    }
    addSentence(p1, extraBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Cups / Discs / Jellies"){
    const p1 = [];

    const formBits = [];
    const form = getSelections("cup_form");
    if(form.length) formBits.push(lowerFirst(form[0]));
    const margin = getSelections("cup_margin");
    if(margin.length && margin[0] !== "Not applicable"){
      formBits.push(`margin ${lowerFirst(margin[0])}`);
    }
    const inside = lowerSelections("cup_inside_colour");
    if(inside.length) formBits.push(`inner/spore surface ${joinHuman(inside)}`);
    const outside = lowerSelections("cup_outside_colour");
    if(outside.length) formBits.push(`outer surface ${joinHuman(outside)}`);
    addSentence(p1, formBits.join(", "));

    const textureBits = [];
    const texture = getSelections("cup_texture");
    if(texture.length) textureBits.push(`outer surface ${lowerFirst(texture[0])}`);
    const jelly = getSelections("jelly_consistency");
    if(jelly.length && jelly[0] !== "Not applicable"){
      textureBits.push(`consistency ${lowerFirst(jelly[0])}`);
    }
    addSentence(p1, textureBits.join(", "));

    paragraphs.push(...p1);
  }

  else if(type === "Morels & allies"){
    const p1 = [];

    const formBits = [];
    const mType = getSelections("morel_type");
    if(mType.length) formBits.push(lowerFirst(mType[0]));
    const relation = getSelections("cap_stipe_relation");
    if(relation.length) formBits.push(`cap–stipe relationship ${lowerFirst(relation[0])}`);
    const surface = getSelections("morel_surface");
    if(surface.length) formBits.push(`surface ${lowerFirst(surface[0])}`);
    addSentence(p1, formBits.join(", "));

    const colourBits = [];
    const colour = lowerSelections("morel_colour");
    if(colour.length) colourBits.push(joinHuman(colour));
    const stipeColour = lowerSelections("stipe_colour");
    if(stipeColour.length) colourBits.push(`stipe ${joinHuman(stipeColour)}`);
    const stipeLen = measurementText("stipe_length", "stipe");
    if(stipeLen) colourBits.push(stipeLen);
    addSentence(p1, colourBits.join(", "));

    paragraphs.push(...p1);
  }

  const habitatSentence = buildHabitatSentence();
  if(habitatSentence) paragraphs.push(sentence(habitatSentence));

  const extraNotes = [];
  const flow = getFlow();
  for(const sec of flow){
    const note = getNote(sec.key);
    if(note && sec.key !== "odour"){
      extraNotes.push(note);
    }
  }
  if(extraNotes.length){
    paragraphs.push(sentence(`Additional notes: ${extraNotes.join("; ")}`));
  }

  const collected = getSelections("specimen_collection");
  if(collected.length && collected[0] === "Yes"){
    paragraphs.push("Specimen collected.");
  }

  const out = paragraphs.filter(Boolean).join("\n\n").trim() || "Not enough information yet to generate a written description.";
  showOutput(out);
  return out;
}

function copyAndOpenINat(){
  const txt = currentOutputOrList();
  if(navigator.clipboard && txt){
    navigator.clipboard.writeText(txt).catch(()=>{});
  }
  window.open("https://www.inaturalist.org/observations/new", "_blank");
}

/* =========================
   FORAY LOG
========================= */

function loadForayLog(){
  try{
    const raw = localStorage.getItem(FORAY_STORAGE_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch(e){
    return [];
  }
}

function saveForayLogArr(arr){
  try{
    localStorage.setItem(FORAY_STORAGE_KEY, JSON.stringify(arr));
  } catch(e){}
}

function saveToForayLog(){
  const description = currentOutputOrList();
  const g = state.textInputs.general || {};
  const now = new Date();
  const entry = {
    id: String(now.getTime()) + "_" + Math.random().toString(16).slice(2),
    createdAt: now.toISOString(),
    observer: safeTrim(g.observer_name || ""),
    date: safeTrim(g.date || ""),
    location: safeTrim(g.location || ""),
    specimenNumber: safeTrim(g.specimen_number || ""),
    fungusType: getSingle("fungus_type") || "",
    hymenium: getSingle("hymenium_type") || "",
    text: description
  };

  const log = loadForayLog();
  log.unshift(entry);
  saveForayLogArr(log);

  showOutput((description ? description + "\n\n" : "") + "Saved to Foray Log ✅");
}

function openForayLog(){
  renderForayLog();
  document.getElementById("forayModal").style.display = "flex";
}

function closeForayLog(){
  document.getElementById("forayModal").style.display = "none";
}

function renderForayLog(){
  const list = document.getElementById("forayList");
  const log = loadForayLog();
  list.innerHTML = "";

  if(!log.length){
    const empty = document.createElement("div");
    empty.style.color = "var(--muted)";
    empty.style.fontSize = "13px";
    empty.style.marginTop = "10px";
    empty.textContent = "No saved observations yet.";
    list.appendChild(empty);
    return;
  }

  log.forEach(item=>{
    const card = document.createElement("div");
    card.className = "logItem";

    const meta = document.createElement("div");
    meta.className = "logMeta";

    const parts = [];
    if(item.date) parts.push(`Date: ${item.date}`);
    if(item.location) parts.push(`Location: ${item.location}`);
    if(item.specimenNumber) parts.push(`Specimen #: ${item.specimenNumber}`);
    if(item.fungusType) parts.push(`Type: ${item.fungusType}`);
    if(item.hymenium) parts.push(`Hymenium: ${item.hymenium}`);
    parts.push(`Saved: ${new Date(item.createdAt).toLocaleString()}`);

    meta.textContent = parts.join(" • ");

    const text = document.createElement("div");
    text.className = "logText";
    text.textContent = item.text || "";

    const btns = document.createElement("div");
    btns.className = "logBtns";

    const copyBtn = document.createElement("button");
    copyBtn.className = "btn primary tiny";
    copyBtn.textContent = "Copy";
    copyBtn.onclick = () => {
      const t = item.text || "";
      if(navigator.clipboard && t){
        navigator.clipboard.writeText(t).catch(()=>{});
      }
    };

    const openINatBtn = document.createElement("button");
    openINatBtn.className = "btn primary tiny";
    openINatBtn.textContent = "Open iNat";
    openINatBtn.onclick = () => {
      const t = item.text || "";
      if(navigator.clipboard && t){
        navigator.clipboard.writeText(t).catch(()=>{});
      }
      window.open("https://www.inaturalist.org/observations/new", "_blank");
    };

    const delBtn = document.createElement("button");
    delBtn.className = "btn secondary tiny";
    delBtn.textContent = "Delete";
    delBtn.onclick = () => {
      const updated = loadForayLog().filter(x => x.id !== item.id);
      saveForayLogArr(updated);
      renderForayLog();
    };

    btns.appendChild(copyBtn);
    btns.appendChild(openINatBtn);
    btns.appendChild(delBtn);

    card.appendChild(meta);
    card.appendChild(text);
    card.appendChild(btns);

    list.appendChild(card);
  });
}

function exportForayLog(){
  const log = loadForayLog();
  if(!log.length){
    alert("Foray Log is empty.");
    return;
  }
  const text = log.map((item, idx) => {
    const headerParts = [];
    if(item.date) headerParts.push(`Date: ${item.date}`);
    if(item.location) headerParts.push(`Location: ${item.location}`);
    if(item.specimenNumber) headerParts.push(`Specimen #: ${item.specimenNumber}`);
    if(item.fungusType) headerParts.push(`Type: ${item.fungusType}`);
    if(item.hymenium) headerParts.push(`Hymenium: ${item.hymenium}`);
    headerParts.push(`Saved: ${new Date(item.createdAt).toLocaleString()}`);
    return `--- Observation ${idx+1} ---\n${headerParts.join(" • ")}\n\n${item.text || ""}\n`;
  }).join("\n");

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      alert("Export copied to clipboard ✅");
    }).catch(()=>{
      alert("Could not copy. You can still select & copy from the log entries.");
    });
  } else {
    alert("Clipboard not available on this device/browser.");
  }
}

function clearForayLog(){
  if(!confirm("Clear the entire Foray Log on this device?")) return;
  saveForayLogArr([]);
  renderForayLog();
}

/* =========================
   INIT
========================= */
render();

</script>
